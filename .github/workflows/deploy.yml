name: Deploy to EC2 (Zero-Downtime)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          # region agent log helper
          debug_log() {
            python3 - "$1" "$2" "$3" <<'PY' | curl -sS -X POST 'http://127.0.0.1:7244/ingest/1c6029e9-7d46-49b9-a14e-a0b53851f08d' -H 'Content-Type: application/json' --data-binary @- >/dev/null 2>&1 || true
