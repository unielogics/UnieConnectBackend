name: Deploy to EC2 (Zero-Downtime)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh" && echo "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/id_ed25519" && chmod 600 "$HOME/.ssh/id_ed25519" && ssh-keyscan -H ${{ secrets.EC2_HOST }} >> "$HOME/.ssh/known_hosts"

      - name: Deploy to EC2
        run: ssh -o StrictHostKeyChecking=no -i "$HOME/.ssh/id_ed25519" ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' < .github/deploy-remote.sh
